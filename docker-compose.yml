services:
  court:
    image: boluobobo/ai-court:latest
    build: .   # 本地构建备选（无预构建镜像时自动 build）
    container_name: ai-court
    restart: unless-stopped
    ports:
      - "127.0.0.1:18789:18789"   # Gateway Dashboard
      - "127.0.0.1:18795:18795"   # 菠萝 GUI（可选）
    volumes:
      # 配置文件（必须挂载）
      - ./openclaw.json:${OPENCLAW_CONFIG_PATH:-/root/.openclaw/openclaw.json}
      # 工作区持久化（记忆、日志等）
      - court-workspace:${OPENCLAW_WORKSPACE:-/root/clawd}
      # OpenViking 数据持久化（可选）
      - court-openviking:/root/.openviking
    environment:
      - LLM_API_KEY=${LLM_API_KEY:-}
      - OPENVIKING_CONFIG_FILE=${OPENVIKING_CONFIG_FILE:-}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18789/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  court-workspace:
  court-openviking:
